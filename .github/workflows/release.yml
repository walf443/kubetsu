name: Release

on:
  push:
    tags:
      - "v*"
      # TODO: Uncomment after the first release of each adapter crate.
      #       Adapter crates depend on `kubetsu` by version on crates.io,
      #       so `kubetsu` (v* tag) must be published first.
      # - "kubetsu-serde-v*"
      # - "kubetsu-fake-v*"
      # - "kubetsu-sqlx-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish kubetsu to crates.io
        if: startsWith(github.ref_name, 'v')
        run: cargo publish -p kubetsu
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # TODO: Uncomment after the first release of kubetsu v0.7.0.
      # - name: Publish kubetsu-serde to crates.io
      #   if: startsWith(github.ref_name, 'kubetsu-serde-v')
      #   run: cargo publish -p kubetsu-serde
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # - name: Publish kubetsu-fake to crates.io
      #   if: startsWith(github.ref_name, 'kubetsu-fake-v')
      #   run: cargo publish -p kubetsu-fake
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      # - name: Publish kubetsu-sqlx to crates.io
      #   if: startsWith(github.ref_name, 'kubetsu-sqlx-v')
      #   run: cargo publish -p kubetsu-sqlx
      #   env:
      #     CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  github-release:
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
